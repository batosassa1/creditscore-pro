services:
  - type: web
    name: creditscore-pro
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      # Python 3.12 obligatoire : le modele ML exige scikit-learn 1.3.2,
      # incompatible avec Python 3.13
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: SECRET_KEY
        generateValue: true
      # Mot de passe du compte admin (a definir dans le tableau de bord Render,
      # onglet Environment : jamais dans le code)
      - key: ADMIN_PASSWORD
        sync: false
      # Base PostgreSQL externe persistante (chaine de connexion Neon,
      # a coller dans le tableau de bord Render, onglet Environment)
      - key: DATABASE_URL
        sync: false
      # Envoi de vrais emails (mot de passe oublie) : renseigner un compte Gmail
      # et un "mot de passe d'application" Google (voir README.md). Optionnel :
      # sans ces variables, l'app reste en mode demo (lien affiche a l'ecran).
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
